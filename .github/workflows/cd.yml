name: CD Pipeline

on:
  push:
    branches:
      - main      # → production ECS
      - develop   # → staging ECS

env:
  AWS_REGION: us-east-1
  BACKEND_ECR_REPOSITORY: url-shortener-backend
  FRONTEND_ECR_REPOSITORY: url-shortener-frontend

jobs:
  # ── Build & Push to ECR ────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    outputs:
      backend-image: ${{ steps.build-backend.outputs.image }}
      frontend-image: ${{ steps.build-frontend.outputs.image }}
      environment: ${{ steps.set-env.outputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment
        id: set-env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        id: build-backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:$IMAGE_TAG
          docker buildx build \
            --platform linux/amd64 \
            --target production \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --push \
            -t $IMAGE_URI \
            -t $ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:latest \
            ./backend
          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Build and push frontend
        id: build-frontend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ENV=${{ steps.set-env.outputs.environment }}
          if [ "$ENV" = "production" ]; then
            API_URL="${{ secrets.PROD_API_URL }}"
            BASE_URL="${{ secrets.PROD_BASE_URL }}"
          else
            API_URL="${{ secrets.STAGING_API_URL }}"
            BASE_URL="${{ secrets.STAGING_BASE_URL }}"
          fi

          IMAGE_URI=$ECR_REGISTRY/$FRONTEND_ECR_REPOSITORY:$IMAGE_TAG
          docker buildx build \
            --platform linux/amd64 \
            --build-arg NEXT_PUBLIC_API_URL=$API_URL \
            --build-arg NEXT_PUBLIC_BASE_URL=$BASE_URL \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --push \
            -t $IMAGE_URI \
            -t $ECR_REGISTRY/$FRONTEND_ECR_REPOSITORY:latest \
            ./frontend
          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT

  # ── Deploy to Staging ──────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging (ECS Fargate)
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS Backend Service
        run: |
          aws ecs update-service \
            --cluster url-shortener-staging \
            --service url-shortener-backend-staging \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Update ECS Frontend Service
        run: |
          aws ecs update-service \
            --cluster url-shortener-staging \
            --service url-shortener-frontend-staging \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for backend service stability
        run: |
          aws ecs wait services-stable \
            --cluster url-shortener-staging \
            --services url-shortener-backend-staging \
            --region ${{ env.AWS_REGION }}

      - name: Wait for frontend service stability
        run: |
          aws ecs wait services-stable \
            --cluster url-shortener-staging \
            --services url-shortener-frontend-staging \
            --region ${{ env.AWS_REGION }}

  # ── Deploy to Production ───────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production (ECS Fargate)
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy backend to production ECS
        id: deploy-backend
        run: |
          aws ecs update-service \
            --cluster url-shortener-production \
            --service url-shortener-backend-production \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Deploy frontend to production ECS
        id: deploy-frontend
        run: |
          aws ecs update-service \
            --cluster url-shortener-production \
            --service url-shortener-frontend-production \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for backend stability
        id: wait-backend
        run: |
          aws ecs wait services-stable \
            --cluster url-shortener-production \
            --services url-shortener-backend-production \
            --region ${{ env.AWS_REGION }}

      - name: Wait for frontend stability
        id: wait-frontend
        run: |
          aws ecs wait services-stable \
            --cluster url-shortener-production \
            --services url-shortener-frontend-production \
            --region ${{ env.AWS_REGION }}

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed — initiating rollback..."
          aws ecs update-service \
            --cluster url-shortener-production \
            --service url-shortener-backend-production \
            --task-definition url-shortener-backend-production \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          aws ecs update-service \
            --cluster url-shortener-production \
            --service url-shortener-frontend-production \
            --task-definition url-shortener-frontend-production \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          echo "Rollback initiated."
