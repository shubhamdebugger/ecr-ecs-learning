name: CD Pipeline

on:
  push:
    branches:
      - main      # → production ECS

env:
  AWS_REGION: us-east-1
  BACKEND_ECR_REPOSITORY: url-shortener-backend
  FRONTEND_ECR_REPOSITORY: url-shortener-frontend

jobs:
  # ── Build & Push to ECR ────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    outputs:
      backend-image: ${{ steps.build-backend.outputs.image }}
      frontend-image: ${{ steps.build-frontend.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        id: build-backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:$IMAGE_TAG
          docker buildx build \
            --platform linux/amd64 \
            --target production \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --push \
            -t $IMAGE_URI \
            -t $ECR_REGISTRY/$BACKEND_ECR_REPOSITORY:latest \
            ./backend
          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Build and push frontend
        id: build-frontend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          API_URL="${{ secrets.PROD_API_URL }}"
          BASE_URL="${{ secrets.PROD_BASE_URL }}"

          IMAGE_URI=$ECR_REGISTRY/$FRONTEND_ECR_REPOSITORY:$IMAGE_TAG
          docker buildx build \
            --platform linux/amd64 \
            --build-arg "NEXT_PUBLIC_API_URL=${API_URL}" \
            --build-arg "NEXT_PUBLIC_BASE_URL=${BASE_URL}" \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --push \
            -t $IMAGE_URI \
            -t $ECR_REGISTRY/$FRONTEND_ECR_REPOSITORY:latest \
            ./frontend
          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT

  # ── Deploy to Production ───────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production (ECS Fargate)
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ---- Capture currently-running revisions, for rollback ----
      - name: Record current backend revision (for rollback)
        id: prev-backend
        run: |
          ARN=$(aws ecs describe-services \
            --cluster url-shortener-production \
            --services url-shortener-backend-production \
            --query 'services[0].taskDefinition' \
            --output text \
            --region ${{ env.AWS_REGION }})
          echo "task-def-arn=$ARN" >> $GITHUB_OUTPUT

      - name: Record current frontend revision (for rollback)
        id: prev-frontend
        run: |
          ARN=$(aws ecs describe-services \
            --cluster url-shortener-production \
            --services url-shortener-frontend-production \
            --query 'services[0].taskDefinition' \
            --output text \
            --region ${{ env.AWS_REGION }})
          echo "task-def-arn=$ARN" >> $GITHUB_OUTPUT

      # ---- Backend: render new task def with new image, register, deploy ----
      - name: Download current backend task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition url-shortener-backend-production \
            --query taskDefinition \
            --region ${{ env.AWS_REGION }} > backend-task-def.json

      - name: Render new backend task definition
        id: render-backend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: backend-task-def.json
          container-name: backend
          image: ${{ needs.build-and-push.outputs.backend-image }}

      - name: Deploy backend task definition to ECS
        id: deploy-backend
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-backend.outputs.task-definition }}
          service: url-shortener-backend-production
          cluster: url-shortener-production
          wait-for-service-stability: true

      # ---- Frontend: render new task def with new image, register, deploy ----
      - name: Download current frontend task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition url-shortener-frontend-production \
            --query taskDefinition \
            --region ${{ env.AWS_REGION }} > frontend-task-def.json

      - name: Render new frontend task definition
        id: render-frontend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: frontend-task-def.json
          container-name: frontend
          image: ${{ needs.build-and-push.outputs.frontend-image }}

      - name: Deploy frontend task definition to ECS
        id: deploy-frontend
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-frontend.outputs.task-definition }}
          service: url-shortener-frontend-production
          cluster: url-shortener-production
          wait-for-service-stability: true

      # ---- Rollback to the previously-running revisions on failure ----
      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed — rolling back to previous task definitions..."
          aws ecs update-service \
            --cluster url-shortener-production \
            --service url-shortener-backend-production \
            --task-definition ${{ steps.prev-backend.outputs.task-def-arn }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          aws ecs update-service \
            --cluster url-shortener-production \
            --service url-shortener-frontend-production \
            --task-definition ${{ steps.prev-frontend.outputs.task-def-arn }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          aws ecs wait services-stable \
            --cluster url-shortener-production \
            --services url-shortener-backend-production url-shortener-frontend-production \
            --region ${{ env.AWS_REGION }}
          echo "Rollback complete."